<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Lock</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" id="app">

<h2 id="title">🔐 Set Your PIN</h2>
<p class="subtitle" id="subtitle">Create a secure PIN</p>

<div class="pin-display">
<div class="pin-box"></div>
<div class="pin-box"></div>
<div class="pin-box"></div>
<div class="pin-box"></div>
</div>

<div class="keypad">
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
<div class="key clear">Clear</div>
<div class="key">0</div>
<div class="key">⌫</div>
</div>

<p class="status" id="status"></p>

</div>

<script src="script.js"></script>
</body>
</html>
